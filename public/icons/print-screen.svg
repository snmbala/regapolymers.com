    <line x1="18" y1="24" x2="46" y2="24"/>
    <line x1="18" y1="28" x2="46" y2="28"/>
    <line x1="18" y1="32" x2="46" y2="32"/>
    <line x1="18" y1="36" x2="46" y2="36"/>
    <line x1="18" y1="40" x2="46" y2="40"/>
    <line x1="24" y1="20" x2="24" y2="44"/>
    <line x1="32" y1="20" x2="32" y2="44"/>
