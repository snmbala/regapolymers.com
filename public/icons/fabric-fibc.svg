<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <rect width="80" height="80" rx="8" fill="#EEF0FA"/>
  <!-- Bulk bag silhouette -->
  <g fill="none" stroke="#334DCC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.6">
    <!-- Lifting loops -->
    <path d="M24 24 Q24 16, 30 16 L32 24"/>
    <path d="M48 24 Q48 16, 54 16 L56 24"/>
    <!-- Bag body -->
    <rect x="20" y="24" width="40" height="36" rx="3"/>
    <!-- Bottom spout hint -->
    <line x1="36" y1="60" x2="36" y2="66"/>
    <line x1="44" y1="60" x2="44" y2="66"/>
    <line x1="34" y1="66" x2="46" y2="66"/>
  </g>
  <!-- Weave texture inside bag -->
  <g stroke="#334DCC" stroke-width="0.7" opacity="0.15">
    <line x1="24" y1="32" x2="56" y2="32"/>
    <line x1="24" y1="40" x2="56" y2="40"/>
    <line x1="24" y1="48" x2="56" y2="48"/>
    <line x1="32" y1="28" x2="32" y2="56"/>
    <line x1="40" y1="28" x2="40" y2="56"/>
    <line x1="48" y1="28" x2="48" y2="56"/>
  </g>
</svg>
