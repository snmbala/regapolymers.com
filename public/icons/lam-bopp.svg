<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="6" fill="#EEF0FA"/>
  <!-- Base fabric layer -->
  <g stroke="#8B9DC3" stroke-width="1" opacity="0.3">
    <line x1="12" y1="34" x2="52" y2="34"/>
    <line x1="12" y1="40" x2="52" y2="40"/>
    <line x1="12" y1="46" x2="52" y2="46"/>
    <line x1="20" y1="30" x2="20" y2="50"/>
    <line x1="32" y1="30" x2="32" y2="50"/>
    <line x1="44" y1="30" x2="44" y2="50"/>
  </g>
  <!-- Glossy lamination layer on top -->
  <rect x="10" y="16" width="44" height="18" rx="3" fill="#334DCC" opacity="0.12"/>
  <rect x="10" y="16" width="44" height="18" rx="3" stroke="#334DCC" stroke-width="1.5" opacity="0.5" fill="none"/>
  <!-- Shine line -->
  <line x1="14" y1="20" x2="28" y2="20" stroke="#fff" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
  <line x1="14" y1="24" x2="22" y2="24" stroke="#fff" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <!-- Arrow showing lamination applied -->
  <path d="M32 11 L32 16" stroke="#334DCC" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M29 14 L32 17 L35 14" stroke="#334DCC" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5" fill="none"/>
</svg>
