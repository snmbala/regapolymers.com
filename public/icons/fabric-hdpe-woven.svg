<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <rect width="80" height="80" rx="8" fill="#EEF0FA"/>
  <!-- Tight dense weave pattern -->
  <g stroke="#1a2d8c" stroke-width="1.5" opacity="0.4">
    <line x1="14" y1="18" x2="66" y2="18"/>
    <line x1="14" y1="24" x2="66" y2="24"/>
    <line x1="14" y1="30" x2="66" y2="30"/>
    <line x1="14" y1="36" x2="66" y2="36"/>
    <line x1="14" y1="42" x2="66" y2="42"/>
    <line x1="14" y1="48" x2="66" y2="48"/>
    <line x1="14" y1="54" x2="66" y2="54"/>
    <line x1="14" y1="60" x2="66" y2="60"/>
  </g>
  <g stroke="#1a2d8c" stroke-width="1.5" opacity="0.28">
    <line x1="18" y1="14" x2="18" y2="66"/>
    <line x1="24" y1="14" x2="24" y2="66"/>
    <line x1="30" y1="14" x2="30" y2="66"/>
    <line x1="36" y1="14" x2="36" y2="66"/>
    <line x1="42" y1="14" x2="42" y2="66"/>
    <line x1="48" y1="14" x2="48" y2="66"/>
    <line x1="54" y1="14" x2="54" y2="66"/>
    <line x1="60" y1="14" x2="60" y2="66"/>
  </g>
  <!-- Density badge -->
  <circle cx="40" cy="40" r="12" fill="#1a2d8c" opacity="0.1"/>
  <text x="40" y="44" text-anchor="middle" font-size="10" font-weight="700" fill="#1a2d8c" opacity="0.5" font-family="sans-serif">HD</text>
</svg>
